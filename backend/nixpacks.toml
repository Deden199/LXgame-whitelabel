# Nixpacks configuration for Railway deployment

[variables]
# Railway build lint may fail when NIXPACKS_PATH is referenced before definition
NIXPACKS_PATH = "/opt/nixpacks"

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gcc"]

[phases.install]
cmds = [
  "pip3 install --break-system-packages -r requirements.prod.txt",
]

[start]
# Provide a fallback port so Dockerfile variable validation does not fail
cmd = "python3 -m uvicorn server:app --host 0.0.0.0 --port ${PORT:-8001}"
